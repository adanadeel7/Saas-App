services:
  - type: web
    name: invoiceforge
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        value: adanadeel903@gmail.com
      - key: CLIENT_URL
        value: https://invoiceforge.onrender.com
      - key: JWT_SECRET
        value: supersecretjwtkey123456!
      - key: MONGO_URI
        value: ""
