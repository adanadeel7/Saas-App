<!DOCTYPE html><html class="dark" lang="en"><head>

                            "secondary-fixed": "#d8e3fb",
                            "on-primary-fixed": "#001a42",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-surface-container-lowest text-on-surface font-body-md antialiased min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient background glow for depth -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0 flex justify-center items-center opacity-30">
<div class="w-[800px] h-[800px] bg-primary-container/10 rounded-full blur-[120px]"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[420px] bg-surface border border-outline-variant rounded-xl p-8 shadow-2xl shadow-black/60 flex flex-col gap-8">
<!-- Header -->
<header class="flex flex-col items-center text-center gap-4">
<div class="w-12 h-12 bg-surface-container-high border border-outline-variant rounded-lg flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined" style="font-size: 28px; font-variation-settings: 'FILL' 1;">
                    target
                </span>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Equinox</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Secure access to your workspace</p>
</div>
</header>
<!-- Form -->
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">
                        mail
                    </span>
<input autocomplete="email" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-inner" id="email" name="email" placeholder="name@company.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors focus:outline-none focus:underline" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">
                        lock
                    </span>
<input autocomplete="current-password" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-inner" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Actions -->
<button class="mt-2 w-full bg-primary text-on-primary rounded-lg py-3 px-4 font-label-md text-label-md uppercase tracking-wider hover:bg-primary-container hover:text-on-primary-container focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface transition-all shadow-[0_0_15px_rgba(173,198,255,0.15)] flex justify-center items-center gap-2 group" type="submit">
                Sign In
                <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">
                    arrow_forward
                </span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 w-full">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">or</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<!-- Social Login -->
<button class="w-full bg-transparent border border-outline-variant text-on-surface rounded-lg py-3 px-4 font-label-md text-label-md uppercase tracking-wider hover:bg-surface-container-high focus:outline-none focus:ring-2 focus:ring-outline-variant focus:ring-offset-2 focus:ring-offset-surface transition-all flex justify-center items-center gap-3" type="button">
<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Sign in with Google
        </button>
</main>
<!-- Footer Links -->
<footer class="mt-8 relative z-10 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
            New to Equinox? 
            <a class="text-primary hover:text-primary-container font-semibold transition-colors focus:outline-none focus:underline ml-1" href="#">
                Create an account
            </a>
</p>
</footer>
</body></html>
